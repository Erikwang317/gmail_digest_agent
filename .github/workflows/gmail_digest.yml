name: Gmail Digest

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 13,17,01 * * *'

jobs:
  run-gmail-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recreate Gmail credential files
        shell: bash
        run: |
          echo "${{ secrets.CLIENT_SECRET }}" | base64 --decode > client_secret.json
          echo "${{ secrets.TOKEN }}" | base64 --decode > token.json

      - name: Validate credential files
        shell: bash
        run: |
          ls -l client_secret.json token.json
          python3 - <<'PY'
          import json

          for f in ["client_secret.json", "token.json"]:
              print(f"Checking {f}...")
              with open(f, "r", encoding="utf-8") as fh:
                  json.load(fh)
              print(f"{f} is valid JSON")
          PY

      - name: Run digest and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python process_inbox.py