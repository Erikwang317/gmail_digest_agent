name: Gmail Digest

on:
  workflow_dispatch:
  schedule:
    # 9am and 7pm US Eastern (EDT: UTC-4)
    - cron: '0 13 * * *'
    - cron: '0 23 * * *'

jobs:
  run-gmail-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Gmail credentials
        shell: bash
        run: |
          echo '${{ secrets.DIGEST_GMAIL_ACCOUNT_KEY }}' > service_account.json

      - name: Run Gmail Digest Agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python process_inbox.py
