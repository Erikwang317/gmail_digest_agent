## Gmail Digest Agent - Importance Rules
## Emails matching these rules are auto-classified before hitting the LLM.

## --- ALWAYS IMPORTANT ---
## Emails from these senders are always flagged as urgent.
urgent_senders:
  - "@irs.gov"
  - "@uscis.gov"
  - "@state.gov"
  - "@dhs.gov"
  - "@ssa.gov"
  - "@courts.gov"
  - "@dmv"

## Emails containing these keywords are always flagged as urgent.
urgent_keywords:
  - "payment due"
  - "payment overdue"
  - "past due"
  - "final notice"
  - "action required"
  - "immediate action"
  - "interview scheduled"
  - "interview invitation"
  - "offer letter"
  - "account suspended"
  - "verify your identity"
  - "court date"
  - "jury duty"
  - "tax return"
  - "deadline"
  - "expiring soon"
  - "eviction"
  - "insurance claim"

## --- BLOCKLIST ---
## Emails from these senders are always skipped (never shown in digest).
## Add junk senders here as you find them in the weekly review.
skip_senders:
  - "noreply@medium.com"
  - "noreply@quora.com"
  - "newsletter@"
  - "digest@"
  - "no-reply@accounts.google.com"
  - "googleaistudio-noreply@google.com"
  - "@mp1.tripadvisor.com"
  - "noreply@robinhood.com"
  - "RecruitingNoReply@ford.com"
  - "noreply@linkedin.com"
  - "notifications@github.com"

## Emails containing these keywords are always skipped.
skip_keywords:
  - "unsubscribe from this list"
  - "weekly digest"
  - "daily digest"
  - "new follower"
  - "trending on"
  - "recommended for you"
  - "new job opportunities"
  - "welcome to"
  - "start making safe and secure"

## Gmail category labels to skip entirely.
skip_labels:
  - "CATEGORY_PROMOTIONS"
  - "CATEGORY_SOCIAL"
  - "CATEGORY_FORUMS"
